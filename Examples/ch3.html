<!DOCTYPE html>
<html>
    <title>Lists</title>

    <body>
        <h1>Let's see my shopping list</h1>
        <ol>
            <li>Potatoes</li>
            <li>Milk</li>
            <li>Bread</li>
        </ol>

        <h1>Nah bullet points are better</h1>
        <ul>
            <li>Potatoes</li>
            <li>Milk</li>
            <ul>
                <li>cow milk</li>
                <li>goat milk</li>
            </ul>
            <li>Bread</li>
        </ul>

        <h1>I'll explain more</h1>

        <dl>
            <dt>Potatoes</dt>
            <dd>just potatoes</dd>

            <dt>Milk</dt>
            <dd>skimmed milk</dd>

            <dt>Bread</dt>
            <dd>French bread</dd>
        </dl>
    </body>
</html>
