<!DOCTYPE html>
<html>
    <head>
        <title>Text</title>
        <style type="text/css">

            h2 {
                font-size: 1.3em;
            }
            #serif {
                font-family: serif
            }

            #sans-serif {
                font-family: sans-serif
            }

            #monospace {
                font-family: monospace;
            }

        </style>
    </head>

    <h2 id="serif">Serif - long passages</h2>
    <h2 id="sans-serif">Sans-Serif - small texts / clean use</h2>
    <h2 id="monospace">Monospace - same width for all fonts / codes</h2>
</html>
