<!DOCTYPE html>
<html>
    <head>
        <title>Buttons Hovering</title>
        <style type="text/css">
            input {
                padding: 6px 12px 6px 12px;
                border: 1px solid #665544;
                color: black;
            }

            input.button {
                color: white;
                background-color: #8c7762;
                margin-left: 2px;
            }
            input.button:hover {
                background-color: #57493b;
            }

            input.button:active {
                background-color: #cfcece
            }

        </style>
    </head>

    <body>
        <input class="answer" type="text" placeholder="Enter email address..."/>
        <input class="button" type="submit" value="Submit"/>
    </body>
</html>
