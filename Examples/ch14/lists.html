<!DOCTYPE html>
<html>
    <head>
        <title>Lists</title>
        <style type="text/css">
            ul {
                list-style-type: square;
                list-style-position: inside;
            }
        </style>
    </head>

    <body>
        <h1>The complete Poems</h1>
        <h2>Emily Dickinson</h2>
        <ul>
            <li>Life</li>
            <li>Nature</li>
            <li>Love</li>
            <li>Time and Eternity</li>
            <li>The Single Hound</li>
        </ul>
    </body>
</html>
