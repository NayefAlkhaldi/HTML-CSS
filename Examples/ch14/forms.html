<!DOCTYPE html>
<html>
    <title>Forms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style type="text/css">
        body {
            font-family:Arial, Helvetica, sans-serif;
        }
        fieldset {
            max-width: 500px;
            min-width: 350px;
            padding: 20px;
            border-radius: 10px;
        }
        
        .title {
            border: 2px solid #dfdede;
            background-color: #e6e5e5;
            border-radius: 5px;
            padding: 10px;
            
        }

        .in {
            margin-bottom: 30px;
        }

        input.in {
            border-color: transparent;
            width: 350px;
            font-size: 16px;
            border-radius: 3px;
            border-bottom-color: rgb(218, 218, 218);
        }

        input:focus {
            outline: transparent;
        }

        .button {
            color: white;
            width: 75px;
            height: 30px;
            padding: 2px;
            margin-inline-end:inherit;
            background-color: #8c7762;
            border-style:hidden;
            float: right;
        }

        input.button:hover {
            background-color: #baafa4;
            cursor: pointer;
            }

        input.button:active {
            background-color: #cfcece
            }

    </style>

    <body>
        <fieldset>
            <legend class="title">LOG IN</legend>
            <legend>Email: <input class="in" type="text" placeholder="name@example.com" /></legend>
            <legend>Password: <input class="in" type="password" placeholder="at least 8 characters" /></legend>
            <legend><input class="button" type="submit"></legend>
        </fieldset>
    </body>
</html>
