<!DOCTYPE html>
<html>
    <head>
        <title>Tables</title>
        <style type="text/css">
            body {
                font-family: Arial, Helvetica, sans-serif;
                color: #111111;
            }
            table {
                width: 600px;
            }
            th, td {
                padding: 7px 10px 10px 10px;
            }


            th {
                text-align: left;
                border-top: 2px solid #dddddd;
                border-bottom: 2px solid #747474;
            }

            .even {
                background-color: #dedddd
            }

            .money {
                text-align: right;
            }

            td:hover {
                color: grey;
                cursor:-moz-grab;
            }
            
        </style>
    </head>

    <body>
        <h1>First Edition Auction</h1>
        <table>
            <tr>
                <th>Author</th>
                <th>Title</th>
                <th class="money">Reserve Price</th>
                <th class="money">Current Bid</th>
            </tr>
            <tr>
                <td>E./E. Cummings</td>
                <td>Tulips & Chimney</td>
                <td class="money">$2,000.00</td>
                <td class="money">$2,642.50</td>
            </tr>
            <tr class="even">
                <td>Charles d'Orleans</td>
                <td>Poemes</td>
                <td class="money"></td>
                <td class="money">5,866.00</td>
            </tr>
            
            <tr>
                <td>T.S. Eliot</td>
                <td>Poems 1909 - 1925</td>
                <td class="money">$1,250.00</td>
                <td class="money">$8,499.35</td>
            </tr>
            <tr class="even">
                <td>Sulvia Plath</td>
                <td>The Collssus</td>
                <td class="money"></td>
                <td class="money">$1031.72</td>
            </tr>
        </table>
    </body>
</html>
