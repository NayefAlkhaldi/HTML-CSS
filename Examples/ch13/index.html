<!DOCTYPE html>
<html>
    <head>
        <title>Dimensions With CSS</title>
        <style>
            div {
                height: 300px;
                width: 400px;
                background-color: #ee3e80;
            }

            p {
                height: 75%;
                width: 75%;
                background-color: #e1ddda;
            }

        </style>
    </head>

    <body>
        <div>
            <p>
            The Moog compay of pioneered the commercial
            manufacture of modular voltage-controlled
            analog synthesizer system in the early 1950s.</p>
        </div>
    </body>
</html>
