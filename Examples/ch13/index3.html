<!DOCTYPE html>
<html>
    <head>
        <title>Borders</title>
        <style type="text/css">
            p.one {
                border-style: double;
                border-width: 2px;
            }

            p.two {
                border-style: double;
                border-width: thick;
            }

            p.three {
                border-style: double;
                border-width: 1px 4px 12px 4px
            }

            p.four {
                border-style: solid;
                border-width: thick;
                border-color: rgb(235, 183, 192) rgb(235, 183, 192)
                              rgb(240, 174, 185) rgb(182, 123, 133);
                padding: 5px;
                width: 400px;
                padding: 20px;
                background-color:rgb(255, 244, 254);
                text-align: center;
                margin: 10px auto 10px auto;
            }
        </style>
    </head>

    <body>
        <p class="one">Hohner's "Clavinet" is essentially an electric clavichord.</p>
        <p class="two">Hohner's "Clavinet" is essentially an electric clavichord.</p>
        <p class="three">Hohner's "Clavinet" is essentially an electric clavichord.</p>
        <p class="four">Hohner's "Clavinet" is essentially an electric clavichord.</p>
    </body>
</html>
