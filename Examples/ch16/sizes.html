<html>
    <head>
        <title>Sizes of Images</title>

        <style>
            .large {
                width: 500px;
                height: 500px;
            }

            .medium {
                width: 250px;
                height: 250px;
            }

            .small {
                width: 100px;
                height: 100px;
            }
        </style>
    </head>

    <body>
        <img src="static/images/magnolia-medium.jpg" class="large" alt="Mangolia">
        <img src="static/images/magnolia-medium.jpg" class="medium" alt="Mangolia">
        <img src="static/images/magnolia-medium.jpg" class="small" alt="Mangolia">
    </body>
</html>
